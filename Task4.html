<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Task4.css">

    <title>Task4</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card__header">
                <div class="card__title">Sign Up </div>
                <div class="card__text">Please fill in this form to create an account!</div>
            </div>
            <div class="form__header">
                <input type="text" placeholder="First Name" class="sm-input">
                <input type="text" placeholder="Last Name" class="sm-input">
            </div>
            <input type="email" placeholder="Email" class="input">
            <input type="password" placeholder="Password" class="input">
            <input type="password" placeholder="Confirm Password" class="input">
            <div class="check">
                <input type="checkbox" >
                <label class="card__text">I accept the <span class="link-text-card"><a href="#">Terms of Use</a> </span>& <span class="link-text-card"><a href="#">Privacy Policy</a></span></label>
            </div>
            <button class="btn">Sign Up</button>
        </div>
        <div class="text">Already have an account? <span ><a href="#" class="link-text">Login here</a> </span></div>

    </div>
</body>
</html>
